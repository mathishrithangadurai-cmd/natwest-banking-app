<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NatWest - Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-left">
                <h1>Welcome, <span id="welcomeUsername"></span></h1>
            </div>
            <div class="header-right">
                <a href="index.html" class="home-icon" title="Go to Login">
                    <i class="fas fa-home"></i>
                </a>
            </div>
        </header>

        <!-- Tabs Navigation -->
        <div class="tabs">
            <button class="tab-button active" data-tab="dbt-tab">
                <i class="fas fa-exchange-alt"></i> DBT (Direct Branch Transfer)
            </button>
            <button class="tab-button" data-tab="deposit-withdraw-tab">
                <i class="fas fa-history"></i> Deposit & Withdraw Details
            </button>
        </div>

        <!-- Tab Content -->
        <!-- Tab 1: DBT -->
        <div id="dbt-tab" class="tab-content active">
            <div class="tab-section">
                <h2>Direct Branch Transfer</h2>
                <p>Manage your transfers securely</p>
                <a href="dbt.html" class="btn btn-primary btn-large">
                    <i class="fas fa-arrow-right"></i> Start Transfer
                </a>
            </div>
        </div>

        <!-- Tab 2: Deposit & Withdraw Details -->
        <div id="deposit-withdraw-tab" class="tab-content">
            <div class="tab-section">
                <h2>Your Transaction History</h2>
                <div id="transactionList" class="transaction-list">
                    <p class="no-transactions">No transactions yet</p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/tabs.js"></script>
</body>
</html>
    </div>
    <script src="js/tabs.js"></script>
</body>
</html>

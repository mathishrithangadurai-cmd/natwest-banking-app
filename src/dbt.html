<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NatWest - Transfer Options</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="mini-header">
            <a href="dashboard.html" class="home-icon">
                <i class="fas fa-arrow-left"></i> Back
            </a>
            <h1>Direct Branch Transfer (DBT)</h1>
            <a href="index.html" class="home-icon">
                <i class="fas fa-home"></i>
            </a>
        </header>

        <div class="options-container">
            <h2>Select Transaction Type</h2>
            <div class="options-grid">
                <a href="deposit.html" class="option-card">
                    <i class="fas fa-arrow-down"></i>
                    <h3>Deposit</h3>
                    <p>Deposit funds to your account</p>
                </a>
                <a href="withdraw.html" class="option-card">
                    <i class="fas fa-arrow-up"></i>
                    <h3>Withdraw</h3>
                    <p>Withdraw funds from your account</p>
                </a>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
